<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 03 - Formulários</title>
    <style>
        div{
            margin-bottom: 10px;
        }
        label, input {
            display: block;
        }
        .checkbox label,
        .checkbox input {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div>
        <form>
            <div>
                <label for="nome">Nome: </label>
                <input type="text" name="nome" placeholder="Escreva seu nome">
            </div>
            <div>
                <label for="cidade">Cidade: </label>
                <input type="text" name="cidade" placeholder="Escreva sua cidade">
            </div>
            <div>
                <label for="CPF">CPF: </label>
                <input type="text" name="cpf" placeholder="Escreva seu CPF">
            </div>
            <div>
                <label for="email">E-mail: </label>
                <input type="email" name="email" placeholder="Escreva seu e-mail">
            </div>
            <div>
                <label for="idade">Idade: </label>
                <input type="number" name="idade" min="0" max="200" placeholder="Escreva sua idade">
            </div>
            <div>
                <label for="data">Data: </label>
                <input type="date" name="data">
            </div>
            <div>
                <label for="senha">Senha: </label>
                <input type="password" name="senha" placeholder="Digite sua senha">
            </div>
            <label for="disciplinas">Selecione suas disciplinas para o semestre:</label>
            <div class="checkbox">
                <input type="checkbox" name="disciplinas[]">
                <label>Banco de Dados</label>
            </div>
            <div class="checkbox">
                <input type="checkbox" name="disciplinas[]">
                <label>Front-End</label>
            </div>
            <div class="checkbox">
                <input type="checkbox" name="disciplinas[]">
                <label>Back-end</label>
            </div>
            <div>
                <label>Selecione um arquivo</label>
                <input type="file" name="arquivos[]" multiple>
            </div>
            <div>
                <label>Selecione um produto:</label>
            </div>
            <div>
                <select>
                    <option value="produto_1">Carne</option>
                    <option value="produto_2">Cerveja</option>
                    <option value="produto_3">Carvão</option>
                    <option value="produto_4">Água</option>
                    <option value="produto_5">Sal</option>
                </select>
            </div>
            <div>
                <label>Deixe seu comentário:</label>
                <textarea></textarea>
            </div>
            <div>
                <label>Informe sua cidade:</label>
                <input type="text" list="cidades">

                <datalist id="cidades">
                    <option>Criciuma</option>
                    <option>Urussanga</option>
                    <option>Nova Veneza</option>
                    <option>Ermo</option>
                    <option>Joinville</option>
                    <option>Florianópolis</option>
                    <option>Blumenau</option>
                    <option>Itajaí</option>
                </datalist>
            </div>
            <div>
                <input type="reset" style="display: inline-block;">
                <input type="submit" style="display: inline-block;">
            </div>
        </form>
    </div>
</body>
</html>
